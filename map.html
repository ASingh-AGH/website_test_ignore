<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ali's Journey ✈️</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a1628;
      color: #e0eeff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
      overflow-x: hidden;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      background: linear-gradient(90deg, #ff4fa3, #ffe94f, #4ff0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
      text-align: center;
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(200,220,255,0.7);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    /* ---- MAP CONTAINER ---- */
    #map-wrap {
      position: relative;
      width: 100%;
      max-width: 760px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(79,163,255,0.25);
      border: 2px solid rgba(79,163,255,0.2);
    }

    #europe-map {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Plane overlay div */
    #map-plane {
      position: absolute;
      font-size: 1.8rem;
      pointer-events: none;
      z-index: 10;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%) rotate(0deg);
      filter: drop-shadow(0 2px 8px rgba(255,79,163,0.8));
      display: none;
    }

    /* ---- ROUTE INFO ---- */
    #route-info {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 1.5rem 0 1rem;
      font-size: 0.95rem;
    }

    .route-stop {
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      border: 2px solid rgba(79,163,255,0.3);
      background: rgba(79,163,255,0.08);
      opacity: 0.3;
      transition: opacity 0.6s, border-color 0.6s, background 0.6s;
    }

    .route-stop.active {
      opacity: 1;
      border-color: #ff4fa3;
      background: rgba(255,79,163,0.15);
      color: #ffe94f;
      font-weight: 700;
    }

    .route-stop.done {
      opacity: 0.7;
      border-color: #4ff0ff;
      background: rgba(79,240,255,0.1);
      color: #4ff0ff;
    }

    .route-arrow {
      color: rgba(200,220,255,0.4);
      font-size: 1.1rem;
    }

    /* ---- BUTTONS ---- */
    .btn-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1.2rem;
    }

    .btn {
      padding: 0.7rem 1.8rem;
      border-radius: 999px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.97); }

    #back-btn {
      background: rgba(255,255,255,0.1);
      color: #e0eeff;
      border: 2px solid rgba(255,255,255,0.2);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    #replay-btn {
      background: linear-gradient(135deg, #ff4fa3, #a84fff);
      color: #fff;
      border: none;
    }

    /* ---- LANDING CELEBRATION ---- */
    #landing-msg {
      display: none;
      margin-top: 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffe94f;
      text-align: center;
      animation: pulse-text 1s infinite alternate;
    }

    @keyframes pulse-text {
      from { opacity: 0.7; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.04); }
    }

    /* City pop-up labels (SVG foreignObject alternative) */
    .city-popup {
      position: absolute;
      background: rgba(10,22,40,0.9);
      border: 1px solid #ff4fa3;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: #ffe94f;
      font-weight: 700;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 20;
    }
    .city-popup.visible { opacity: 1; }
  </style>
</head>
<body>

  <h1>✈️ Ali's Journey</h1>
  <p class="subtitle">From Germany all the way to Katowice, Poland — one epic adventure.</p>

  <div id="map-wrap">
    <!--
      Projection: lon 4–24°E → x 0–700, lat 47–56°N → y 0–500
      projX(lon) = (lon-4)/20*700
      projY(lat) = (56-lat)/9*500

      Cities (lon, lat → svg x,y):
        Erlangen  11.0, 49.6 → 245, 356
        Bremen     8.8, 53.1 → 168, 161
        Kraków    19.9, 50.1 → 557, 328
        Katowice  19.0, 50.3 → 525, 317
    -->
    <svg id="europe-map" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">

      <!-- Ocean / background -->
      <rect width="700" height="500" fill="#0d2340"/>

      <!-- Grid lines (lat/lon graticule) -->
      <g stroke="rgba(79,163,255,0.1)" stroke-width="1">
        <!-- Vertical lon lines every 4 degrees: 8,12,16,20 -->
        <line x1="140" y1="0" x2="140" y2="500"/>
        <line x1="280" y1="0" x2="280" y2="500"/>
        <line x1="420" y1="0" x2="420" y2="500"/>
        <line x1="560" y1="0" x2="560" y2="500"/>
        <!-- Horizontal lat lines every 2 degrees: 48,50,52,54 -->
        <line x1="0" y1="444" x2="700" y2="444"/>
        <line x1="0" y1="333" x2="700" y2="333"/>
        <line x1="0" y1="222" x2="700" y2="222"/>
        <line x1="0" y1="111" x2="700" y2="111"/>
      </g>

      <!-- North Sea / Baltic Sea label area (top strip) -->
      <text x="100" y="75" fill="rgba(79,163,255,0.45)" font-size="11" font-style="italic">North Sea</text>
      <text x="430" y="65" fill="rgba(79,163,255,0.45)" font-size="11" font-style="italic">Baltic Sea</text>

      <!-- Netherlands (simplified) -->
      <polygon points="18,250 22,183 55,139 112,156 100,200 95,250 88,310 70,306"
        fill="#1c3d2a" stroke="#2d6640" stroke-width="1.5" opacity="0.8"/>

      <!-- Germany -->
      <polygon id="germany"
        points="70,250 125,150 192,83 280,89 357,122 368,233 342,406 238,472 125,461 95,361 73,306"
        fill="#1e4a2c" stroke="#3a8a4a" stroke-width="2"/>
      <text x="190" y="310" fill="rgba(180,255,160,0.55)" font-size="13" font-weight="bold" text-anchor="middle">GERMANY</text>

      <!-- Czech Republic (simplified) -->
      <polygon points="300,278 368,306 518,344 507,389 300,411"
        fill="#1a3d22" stroke="#2a6030" stroke-width="1.5" opacity="0.9"/>

      <!-- Austria (simplified sliver south of Bavaria/Czech) -->
      <polygon points="150,461 240,472 342,406 380,430 350,472 200,480"
        fill="#193825" stroke="#2d6040" stroke-width="1.5" opacity="0.8"/>

      <!-- Poland -->
      <polygon id="poland"
        points="357,122 420,83 507,83 665,94 700,250 648,389 518,344 403,317 368,233"
        fill="#24502e" stroke="#3a8a4a" stroke-width="2"/>
      <text x="530" y="220" fill="rgba(180,255,160,0.55)" font-size="13" font-weight="bold" text-anchor="middle">POLAND</text>

      <!-- ---- FLIGHT PATH ---- -->
      <!-- The path is drawn progressively via stroke-dashoffset animation -->
      <!-- Total path length ≈ 667px; calculated below with JS -->
      <path id="flight-path"
        d="M 245,356 L 168,161 L 557,328 L 525,317"
        stroke="#ff4fa3"
        stroke-width="3"
        stroke-dasharray="10 7"
        stroke-linecap="round"
        fill="none"
        opacity="0.9"/>

      <!-- ---- CITY MARKERS ---- -->
      <!-- Erlangen -->
      <circle id="dot-erlangen" cx="245" cy="356" r="6"
        fill="#ffe94f" stroke="#fff" stroke-width="1.5" opacity="0"/>

      <!-- Bremen -->
      <circle id="dot-bremen" cx="168" cy="161" r="6"
        fill="#ffe94f" stroke="#fff" stroke-width="1.5" opacity="0"/>

      <!-- Kraków -->
      <circle id="dot-krakow" cx="557" cy="328" r="6"
        fill="#ffe94f" stroke="#fff" stroke-width="1.5" opacity="0"/>

      <!-- Katowice – final destination, bigger + glow -->
      <circle id="dot-katowice-glow" cx="525" cy="317" r="14"
        fill="#ff4fa3" opacity="0" filter="url(#glow)"/>
      <circle id="dot-katowice" cx="525" cy="317" r="8"
        fill="#ff4fa3" stroke="#fff" stroke-width="2" opacity="0"/>

      <!-- SVG filter for glow effect -->
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- City labels (SVG text) -->
      <text id="lbl-erlangen" x="255" y="350" fill="#ffe94f" font-size="11" font-weight="bold" opacity="0">Erlangen</text>
      <text id="lbl-bremen"   x="178" y="155" fill="#ffe94f" font-size="11" font-weight="bold" opacity="0">Bremen</text>
      <text id="lbl-krakow"   x="567" y="322" fill="#ffe94f" font-size="11" font-weight="bold" opacity="0">Kraków</text>
      <text id="lbl-katowice" x="535" y="311" fill="#ff4fa3" font-size="12" font-weight="bold" opacity="0">Katowice 🎉</text>

    </svg><!-- /svg -->

    <!-- Plane emoji overlaid on map via absolute positioning -->
    <div id="map-plane">✈️</div>

  </div><!-- /map-wrap -->

  <!-- Route info strip -->
  <div id="route-info">
    <span class="route-stop" id="stop-erlangen">📍 Erlangen, DE</span>
    <span class="route-arrow">✈</span>
    <span class="route-stop" id="stop-bremen">📍 Bremen, DE</span>
    <span class="route-arrow">✈</span>
    <span class="route-stop" id="stop-krakow">📍 Kraków, PL</span>
    <span class="route-arrow">✈</span>
    <span class="route-stop" id="stop-katowice">🎉 Katowice, PL</span>
  </div>

  <div id="landing-msg">🎉 Welcome to Katowice, Ali! 🎉</div>

  <div class="btn-row">
    <a href="index.html" id="back-btn" class="btn">← Back to the Party!</a>
    <button id="replay-btn" class="btn">▶ Replay Journey</button>
  </div>

  <script>
    // ==================== MAP ANIMATION ====================
    const pathEl      = document.getElementById('flight-path');
    const planeEl     = document.getElementById('map-plane');
    const mapWrap     = document.getElementById('map-wrap');
    const svgEl       = document.getElementById('europe-map');
    const landingMsg  = document.getElementById('landing-msg');
    const replayBtn   = document.getElementById('replay-btn');

    // Route waypoints as fractions of total path length
    // Erlangen→Bremen ≈ 210px, Bremen→Kraków ≈ 423px, Kraków→Katowice ≈ 34px  total ≈ 667px
    const TOTAL_LEN   = 667; // approximate; refined by getTotalLength below
    const DURATION_MS = 8000; // 8 seconds for full journey

    // City stop fractions along the path
    const STOPS = [
      { frac: 0,     stopId: 'stop-erlangen',  dotId: 'dot-erlangen',  lblId: 'lbl-erlangen',  glowId: null },
      { frac: 0.315, stopId: 'stop-bremen',    dotId: 'dot-bremen',    lblId: 'lbl-bremen',    glowId: null },
      { frac: 0.95,  stopId: 'stop-krakow',    dotId: 'dot-krakow',    lblId: 'lbl-krakow',    glowId: null },
      { frac: 1.0,   stopId: 'stop-katowice',  dotId: 'dot-katowice',  lblId: 'lbl-katowice',  glowId: 'dot-katowice-glow' },
    ];

    let animationId   = null;
    let startTime     = null;
    let actualLen     = TOTAL_LEN;
    let stopsActivated = [];

    function init() {
      // Get accurate path length
      try { actualLen = pathEl.getTotalLength(); } catch(e) { actualLen = TOTAL_LEN; }

      // Hide path initially (dashoffset = actualLen hides it completely)
      pathEl.style.strokeDasharray  = `10 7`;
      // We'll drive stroke-dashoffset via JS to progressively draw the path
      // Use a solid dashes approach: dasharray = totalLen, offset = totalLen → 0
      pathEl.style.strokeDasharray = String(actualLen + 20);
      pathEl.style.strokeDashoffset = String(actualLen + 20);

      // Reset city markers
      STOPS.forEach(s => {
        setOpacity(s.dotId, 0);
        setOpacity(s.lblId, 0);
        if (s.glowId) setOpacity(s.glowId, 0);
        document.getElementById(s.stopId).className = 'route-stop';
      });
      stopsActivated = new Array(STOPS.length).fill(false);

      landingMsg.style.display = 'none';
      planeEl.style.display = 'none';
      startTime = null;
      if (animationId) cancelAnimationFrame(animationId);
    }

    function setOpacity(id, val) {
      const el = document.getElementById(id);
      if (el) el.setAttribute('opacity', val);
    }

    function svgToScreen(svgX, svgY) {
      const rect    = svgEl.getBoundingClientRect();
      const wrapRect = mapWrap.getBoundingClientRect();
      const viewBox  = svgEl.viewBox.baseVal;
      const scaleX   = rect.width  / viewBox.width;
      const scaleY   = rect.height / viewBox.height;
      return {
        x: (svgX * scaleX) + (rect.left - wrapRect.left),
        y: (svgY * scaleY) + (rect.top  - wrapRect.top)
      };
    }

    function activateStop(index) {
      if (stopsActivated[index]) return;
      stopsActivated[index] = true;
      const s = STOPS[index];

      // Dot + label appear
      setOpacity(s.dotId, 1);
      setOpacity(s.lblId, 1);
      if (s.glowId) setOpacity(s.glowId, 0.6);

      // Route strip
      const strip = document.getElementById(s.stopId);
      // Mark previous as done
      if (index > 0) {
        const prev = document.getElementById(STOPS[index - 1].stopId);
        prev.className = 'route-stop done';
      }
      strip.className = 'route-stop active';

      // Landing celebration
      if (index === STOPS.length - 1) {
        setTimeout(() => {
          landingMsg.style.display = 'block';
          spawnMapConfetti();
        }, 400);
      }
    }

    function animateFrame(timestamp) {
      if (!startTime) startTime = timestamp;
      const elapsed  = timestamp - startTime;
      const progress = Math.min(elapsed / DURATION_MS, 1);

      // Ease in-out cubic
      const eased = progress < 0.5
        ? 4 * progress * progress * progress
        : 1 - Math.pow(-2 * progress + 2, 3) / 2;

      const dist = eased * actualLen;

      // Draw path progressively
      pathEl.style.strokeDashoffset = String(actualLen + 20 - dist);

      // Move plane
      const pt      = pathEl.getPointAtLength(Math.min(dist, actualLen));
      const ptAhead = pathEl.getPointAtLength(Math.min(dist + 2, actualLen));
      const angle   = Math.atan2(ptAhead.y - pt.y, ptAhead.x - pt.x) * 180 / Math.PI;

      const screen = svgToScreen(pt.x, pt.y);
      planeEl.style.left      = screen.x + 'px';
      planeEl.style.top       = screen.y + 'px';
      planeEl.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;

      if (!planeEl.style.display || planeEl.style.display === 'none') {
        planeEl.style.display = 'block';
      }

      // Activate city stops when plane reaches them
      STOPS.forEach((s, i) => {
        if (!stopsActivated[i] && eased >= s.frac) {
          activateStop(i);
        }
      });

      if (progress < 1) {
        animationId = requestAnimationFrame(animateFrame);
      } else {
        // Ensure all stops activated
        STOPS.forEach((_, i) => activateStop(i));
      }
    }

    function startAnimation() {
      init();
      // Small delay to let browser render
      setTimeout(() => {
        animationId = requestAnimationFrame(animateFrame);
      }, 500);
    }

    replayBtn.addEventListener('click', startAnimation);

    // Auto-start on load
    window.addEventListener('load', startAnimation);

    // ==================== MAP CONFETTI ====================
    const COLORS = ['#ff4fa3','#ffe94f','#4ff0ff','#a84fff','#ff6b35','#7fff00'];
    function spawnMapConfetti() {
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          Object.assign(el.style, {
            position: 'fixed',
            left: Math.random() * 100 + 'vw',
            top: '-20px',
            width:  (6 + Math.random() * 10) + 'px',
            height: (6 + Math.random() * 10) + 'px',
            backgroundColor: COLORS[Math.floor(Math.random() * COLORS.length)],
            borderRadius: Math.random() > 0.5 ? '50%' : '2px',
            pointerEvents: 'none',
            zIndex: '9999',
            animation: `confFall ${2.5 + Math.random() * 3}s linear forwards`
          });
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 6000);
        }, Math.random() * 2000);
      }
    }
  </script>

  <style>
    @keyframes confFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
    }
  </style>

</body>
</html>
